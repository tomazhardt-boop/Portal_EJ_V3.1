<div class="page-header">
  <div>
    <button class="btn btn-outline btn-back" onclick="goTo('projetos')">Voltar para projetos</button>
    <h1 id="proj-name">Projeto</h1>
    <div class="subtitle">Detalhes do projeto, membros e cronograma de tarefas.</div>
  </div>
  <div class="u-row">
    <button class="btn btn-purple" id="proj-conclude-btn" onclick="concludeProject()" style="display:none;">✓ Projeto concluído</button>
    <button class="btn btn-outline" id="proj-drive-btn">📁 Drive</button>
    <button class="btn btn-primary" onclick="openNewTask()">+ Nova tarefa</button>
  </div>
</div>

<div class="grid cols-2">
  <div class="card flex-card">
    <div class="card-title">Informações</div>
    <div id="proj-info" class="u-col text-13"></div>
  </div>

  <div class="card flex-card">
    <div class="card-title">Membros vinculados</div>
    <div id="proj-members" class="u-col"></div>
  </div>

  <div class="card full-col">
    <div class="card-title">Tarefas</div>
    <table>
      <thead><tr><th></th><th>Tarefa</th><th>Responsável</th><th>Período</th><th>Status</th></tr></thead>
      <tbody id="proj-tasks"></tbody>
    </table>
  </div>

  <div class="card full-col">
    <div class="card-title">
      <span>Cronograma</span>
      <span id="proj-cronograma-controls"></span>
    </div>
    <div id="proj-cronograma" style="padding:4px 0;"></div>
  </div>
</div>
