<div class="page-header">
  <div>
    <h1>Gerenciar Permissões</h1>
    <div class="subtitle">Como Presidente, você pode alterar o cargo e os acessos de cada membro.</div>
  </div>
  <button class="btn btn-primary">+ Convidar membro</button>
</div>

<div class="card">
  <div style="display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; align-items:center;">
    <input type="text" id="perm-search" placeholder="Buscar por nome ou cargo..." style="flex:1; max-width:260px;" />
    <select id="perm-role">
      <option>Todos os cargos</option>
      <option>Presidente</option>
      <option>Diretor</option>
      <option>Gerente</option>
      <option>Membro</option>
      <option>Trainee</option>
    </select>
    <select id="perm-sector">
      <option>Todos os setores</option>
      <option>Coordenação</option>
      <option>Projetos</option>
      <option>Comercial</option>
      <option>ADM/FIN</option>
    </select>
  </div>

  <table>
    <thead>
      <tr><th>Membro</th><th>Cargo</th><th>Setor</th><th>Nível de acesso</th><th>Status</th><th></th></tr>
    </thead>
    <tbody id="permissions-table">
      <!-- Linhas preenchidas via JS -->
    </tbody>
  </table>
</div>
